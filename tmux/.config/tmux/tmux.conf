set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc" # This ensures true color support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -g mouse on
set -g set-clipboard on

unbind C-b
set -g prefix C-Space
bind-key C-a send-prefix
# bind -n C-M-l send-keys 'clear' C-m

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "config reloaded"
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane
# x11
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
# bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
# wayland
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# --- Tokyo Night Colors ---
# Night: #1a1b26 | Storm: #24283b | Selection: #33467c | Foreground: #c0caf5
# Blue: #7aa2f7 | Cyan: #7dcfff | Magenta: #bb9af7

# Status bar general
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length 50
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[bg=#1a1b26,fg=#7aa2f7] "

# Window status - Inactive
setw -g window-status-format "#[fg=#414868,bg=#1a1b26] #I: #W "

# Window status - Active
setw -g window-status-current-format "#[fg=#7aa2f7,bg=#24283b,bold] #I: #W "

# Right side of status bar (Time and Date)
set -g status-right "#[fg=#414868]#[fg=#c0caf5,bg=#414868] %Y-%m-%d │ %H:%M "

# Pane borders
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

# Message/Command line
set -g message-style "fg=#7dcfff,bg=#24283b,bold"

# Selection mode colors
setw -g mode-style "fg=#7aa2f7,bg=#33467c"

