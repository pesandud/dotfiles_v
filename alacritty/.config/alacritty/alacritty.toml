[general]
live_config_reload = true

[terminal]
shell = { program = "/usr/bin/zsh" }

[window]
padding = { x = 5, y = 2 }
opacity = 1.0

[scrolling]
history = 1500

[font]
size = 15.0
normal = { family = "Maple Mono NF", style = "Regular" }
bold = { family = "Maple Mono NF", style = "Bold" }
italic = { family = "Maple Mono NF", style = "Italic" }
bold_italic = { family = "Maple Mono NF", style = "Bold Italic" }

[cursor]
style = "Block"
blink_interval = 0

# --- Tokyonight Colors ---
[colors.primary]
background = "#16161e"
foreground = "#c0caf5"

[colors.selection]
text = "#c0caf5"
background = "#283457"

[colors.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

# --- Key Bindings ---
[[keyboard.bindings]]
key = "K"
mods = "Alt"
action = "ScrollLineUp"

[[keyboard.bindings]]
key = "J"
mods = "Alt"
action = "ScrollLineDown"

[[keyboard.bindings]]
key = "K"
mods = "Alt|Shift"
action = "ScrollPageUp"

[[keyboard.bindings]]
key = "J"
mods = "Alt|Shift"
action = "ScrollPageDown"

[[keyboard.bindings]]
key = "G"
mods = "Alt"
action = "ScrollToTop"

[[keyboard.bindings]]
key = "G"
mods = "Alt|Shift"
action = "ScrollToBottom"

[[keyboard.bindings]]
key = "C"
mods = "Alt"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Alt"
action = "Paste"

[[keyboard.bindings]]
key = "Equals"
mods = "Alt"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Alt"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Alt"
action = "ResetFontSize"
