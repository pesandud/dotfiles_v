# --- Font Configuration ---
font_family      JetBrainsMonoNL Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        15.0

# --- Performance & Rendering Tweaks ---
# Lower repaint_delay (ms) = higher FPS. 8ms is roughly 125FPS.
# Lower input_delay (ms) = less lag, but higher CPU. 2-3 is the sweet spot.
repaint_delay    8
input_delay      2
sync_to_monitor  yes
wayland_enable_ime no

# --- Remove Bloat (UI/Features) ---
enable_audio_bell    no
update_check_interval 0
confirm_os_window_close 0
allow_remote_control no
term xterm-kitty

# Disable Tab Bar (Since you use tmux)
show_tab_bar_style never
map ctrl+t no_op
map ctrl+shift+t no_op

# --- Colors (Tokyo Night) ---
foreground           #c0caf5
background           #16161e
selection_foreground #c0caf5
selection_background #283457
url_color            #73daca
cursor               #c0caf5
cursor_text_color    #16161e

# Terminal Colors
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5
color16 #ff9e64
color17 #db4b4b

# --- Window Layout ---
window_padding_width 2 5
background_opacity 1.0
hide_window_decorations yes

# --- Cursor ---
# cursor_shape block
cursor_blink_interval 0
cursor_trail 3
cursor_trail_decay 0.1 0.4

# --- Key Bindings ---
# Clear default Kitty binds to prevent accidental triggers
clear_all_shortcuts yes

# Functional binds (Alt = Mod1)
map alt+c             copy_to_clipboard
map alt+v             paste_from_clipboard
map alt+equal         change_font_size all +1.0
map alt+minus         change_font_size all -1.0
map alt+0             change_font_size all 0

# Scrolling (Managed by Kitty when not in tmux)
map alt+k             scroll_line_up
map alt+j             scroll_line_down
map alt+shift+k       scroll_page_up
map alt+shift+j       scroll_page_down
map alt+g             scroll_home
map alt+shift+g       scroll_end

# Pass through common keys
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
