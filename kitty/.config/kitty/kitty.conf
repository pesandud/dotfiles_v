include themes/tokyonight_night.conf

font_family      DejavuSansM Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        17.0

symbol_map U+1F000-U+1FAFF Noto Color Emoji

cursor_shape               block
cursor_blink_interval	   0
cursor_trail 3
cursor_trail_decay 0.1 0.4

# some optimizations
confirm_os_window_close 0
allow_hyperlink			no
close_on_child_death	yes

background_opacity 0.95

# Focus highlight (mirrors ALPHA_FOCUS_HIGHLIGHT_PATCH alphaUnfocused=0.6)
# Why: dimming unfocused windows helps you instantly know which terminal is active.
inactive_text_alpha 0.7


# ──────────────────────────────────────────────────────────
# WINDOW / BORDER
# Why: st used borderpx=4. kitty uses window_padding_width for inner padding
# and a separate border for the OS window decoration.
# ──────────────────────────────────────────────────────────
window_padding_width    4
window_border_width     1pt
active_border_color     #7aa2f7
inactive_border_color   #414868


# ──────────────────────────────────────────────────────────
# TERMINAL IDENTITY
# Why: st set termname="st-256color". kitty identifies itself as xterm-kitty
# which has broader support for modern escape sequences including undercurl.
# ──────────────────────────────────────────────────────────
term xterm-kitty

scrollback_lines 2000

# ──────────────────────────────────────────────────────────
# MOUSE / SELECTION
# Why: st had doubleclicktimeout=300 and tripleclicktimeout=600.
# kitty measures in seconds.
# ──────────────────────────────────────────────────────────
click_interval           0.3
mouse_hide_wait          3.0
copy_on_select           no
strip_trailing_spaces    smart

# Rectangular selection = Alt+drag (mirrors st's SEL_RECTANGULAR = Mod1Mask)
# Why: holding Alt while dragging in kitty also triggers rectangular selection.
# This is built-in — no extra config needed. Documented here for awareness.


# ──────────────────────────────────────────────────────────
# BELL
# Why: st had bellvolume=0 (disabled). kitty uses visual bell instead.
# ──────────────────────────────────────────────────────────
enable_audio_bell    no
visual_bell_duration 0.0


# ──────────────────────────────────────────────────────────
# TABS / SPACING
# Why: st used tabspaces=8 (POSIX default). kitty renders tabs dynamically
# but you can set the visual width.
# ──────────────────────────────────────────────────────────
tab_bar_style        powerline
tab_powerline_style  slanted


# ──────────────────────────────────────────────────────────
# PERFORMANCE / LATENCY
# Why: st used minlatency=2ms / maxlatency=33ms for draw scheduling.
# kitty's repaint_delay and input_delay serve the same purpose.
# ──────────────────────────────────────────────────────────
repaint_delay  10
input_delay    3
sync_to_monitor yes


# ──────────────────────────────────────────────────────────
# KEYBOARD SHORTCUTS
# Why: st used MODKEY=Mod1Mask (Alt) and TERMMOD=Ctrl+Shift.
# Porting the key bindings to kitty's map syntax.
# ──────────────────────────────────────────────────────────

# Zoom (st: MODKEY + equal/minus/0)
map alt+equal        change_font_size all +1.0
map alt+minus        change_font_size all -1.0
map alt+0            change_font_size all 0

# Clipboard (st: MODKEY+c/v, Shift+Insert)
map alt+c            copy_to_clipboard
map alt+v            paste_from_clipboard
map shift+insert     paste_from_clipboard

# Scrollback (st: MODKEY+k/j = line, MODKEY+Shift+K/J = page, g/G = top/bottom)
map alt+k            scroll_line_up
map alt+j            scroll_line_down
map alt+shift+k      scroll_page_up
map alt+shift+j      scroll_page_down
map alt+g            scroll_home
map alt+shift+g      scroll_end

# URL open (st: MODKEY+u via externalpipe + xurls)
# Why: kitty has a native URL hint mode — cleaner than piping through dmenu.
map alt+u            open_url_with_hints

# Numlock toggle (st: TERMMOD + Num_Lock)
map ctrl+shift+num_lock no_op

clipboard_control write-clipboard write-primary no-append
