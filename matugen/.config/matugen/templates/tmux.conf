# ~/.config/matugen/templates/tmux.conf
# Matugen generated tmux theme

# Default status bar colors
set-option -g status-style "bg={{colors.surface.default.hex}},fg={{colors.on_surface.default.hex}}"

# Default window title colors
set-window-option -g window-status-style "bg={{colors.surface.default.hex}},fg={{colors.on_surface_variant.default.hex}}"

# Active window title colors
set-window-option -g window-status-current-style "bg={{colors.primary.default.hex}},fg={{colors.on_primary.default.hex}},bold"

# Pane border
set-option -g pane-border-style "fg={{colors.surface_variant.default.hex}}"
set-option -g pane-active-border-style "fg={{colors.primary.default.hex}}"

# Message text
set-option -g message-style "bg={{colors.secondary_container.default.hex}},fg={{colors.on_secondary_container.default.hex}}"

# Pane number display
set-option -g display-panes-active-colour "{{colors.primary.default.hex}}"
set-option -g display-panes-colour "{{colors.secondary.default.hex}}"

# Clock mode
set-window-option -g clock-mode-colour "{{colors.primary.default.hex}}"
